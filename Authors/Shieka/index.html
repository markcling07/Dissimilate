<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shieka's Mountain Climbing Journey</title>
    <meta name="description" content="Explore Shieka's mountain climbing albums across the Philippines, featuring her adventures on Mt. Apo and Mt. Sumagaya.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://markcling07.github.io/Dissimilate/Authors/Shieka/">
    <meta property="og:title" content="Shieka's Mountain Climbing Journey">
    <meta property="og:description" content="Explore Shieka's mountain climbing albums across the Philippines, featuring her adventures on Mt. Apo and Mt. Sumagaya.">
    <meta property="og:image" content="https://markcling07.github.io/Dissimilate/Authors/Shieka/IMG/OG.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Shieka's Mountain Climbing Journey">
    <meta name="twitter:description" content="Explore Shieka's mountain climbing albums across the Philippines, featuring her adventures on Mt. Apo and Mt. Sumagaya.">
    <meta name="twitter:image" content="https://markcling07.github.io/Dissimilate/Authors/Shieka/IMG/OG.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="profile-container">
        <!-- Sky hero: editorial headline with sticker accents -->
        <section class="sky">
            <div class="clouds" aria-hidden="true">
                <span class="cloud cloud-1"></span>
                <span class="cloud cloud-2"></span>
                <span class="cloud cloud-3"></span>
            </div>

            <div class="hero">
                <h1 class="hero-title">
                    <span class="sr-only">Shieka &mdash; </span>
                    <span class="ht-line ht-1">Some</span>
                    <span class="ht-line ht-2"><em>mountains</em></span>
                    <span class="ht-line ht-3">I&rsquo;ve climbed</span>
                </h1>

                <a class="sticker sticker-pill" href="https://www.instagram.com/shiekaminutezz/" target="_blank" rel="noopener">@shieka</a>

                <span class="sticker sticker-flower" aria-hidden="true">
                    <svg viewBox="0 0 64 64" focusable="false">
                        <g class="petals">
                            <circle cx="32" cy="11" r="12"/>
                            <circle cx="50" cy="22" r="12"/>
                            <circle cx="50" cy="42" r="12"/>
                            <circle cx="32" cy="53" r="12"/>
                            <circle cx="14" cy="42" r="12"/>
                            <circle cx="14" cy="22" r="12"/>
                            <circle cx="32" cy="32" r="15"/>
                        </g>
                    </svg>
                    <span class="flower-emoji">&#127956;&#65039;</span>
                </span>

                <span class="sticker sticker-tag">in the Philippines</span>

                <svg class="sticker sticker-scribble" viewBox="0 0 220 30" aria-hidden="true" focusable="false">
                    <path d="M6 16 C 60 6, 150 6, 214 12" />
                    <path d="M22 24 C 80 15, 160 17, 198 21" />
                </svg>

                <svg class="sticker sticker-cursor" viewBox="0 0 40 44" aria-hidden="true" focusable="false">
                    <path d="M10 2 L10 34 L18 26 L24 40 L31 37 L25 23 L34 23 Z" />
                </svg>
            </div>

            <!-- Featured Fan Cluster (best shots) -->
            <section class="featured-section" aria-label="Featured photos">
                <div class="featured-cluster">
                    <div class="featured-card">
                        <img src="Featured/581378042_18412780828139984_6224070092058429233_n.jpg" alt="Mt. Apo mountain view">
                    </div>
                    <div class="featured-card">
                        <img src="Featured/727799297_18445918189139984_8950811349880934994_n.jpg" alt="Mt. Sumagaya summit moment">
                    </div>
                    <div class="featured-card">
                        <img src="Featured/582628317_18412781956139984_2453858782464976744_n.jpg" alt="Climbing moment on Mt. Apo">
                    </div>
                    <div class="featured-card">
                        <img src="Featured/727519032_18445918219139984_5489886579211054941_n.jpg" alt="Mt. Sumagaya trail moment">
                    </div>
                    <div class="featured-card">
                        <img src="Featured/727799593_18445918249139984_6269975315899081566_n.jpg" alt="Peak experience on Mt. Sumagaya">
                    </div>
                </div>
            </section>
        </section>

        <!-- Meadow: albums as paper photo-stacks on the grass -->
        <section class="meadow">
            <div class="albums-grid">
                <!-- Mt. Apo Album -->
                <a href="Apo/index.html" class="album-card">
                    <div class="album-tile tape-pink">
                        <img class="mini mini-1" src="Apo/IMG/583434493_18412782139139984_7437230341686594847_n.jpg" alt="">
                        <img class="mini mini-2" src="Apo/IMG/582628317_18412781956139984_2453858782464976744_n.jpg" alt="">
                        <img class="mini mini-3" src="Apo/IMG/583128090_18412781974139984_7060840036475088583_n.jpg" alt="Mt. Apo album">
                    </div>
                    <h3 class="album-title">Mt. <em>Apo</em> Album</h3>
                    <p class="album-count">16 photos</p>
                </a>

                <!-- Mt. Sumagaya Album -->
                <a href="Sumagaya/index.html" class="album-card">
                    <div class="album-tile tape-butter">
                        <img class="mini mini-1" src="Sumagaya/IMG/727519200_18445918264139984_2725567034505959212_n.jpg" alt="">
                        <img class="mini mini-2" src="Sumagaya/IMG/727772761_18445918228139984_5133385655683721581_n.jpg" alt="">
                        <img class="mini mini-3" src="Sumagaya/IMG/727834802_18445918282139984_849387163368647287_n.jpg" alt="Mt. Sumagaya album">
                    </div>
                    <h3 class="album-title">Mt. <em>Sumagaya</em> Album</h3>
                    <p class="album-count">9 photos</p>
                </a>
            </div>

            <!-- Footer -->
            <footer class="profile-footer">
                <a class="footer-link" href="../../index.html">&larr; Back to Dissimilate</a>
            </footer>
        </section>
    </main>

    <!-- Lightbox Popup -->
    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="lightbox-close" aria-label="Close">&times;</button>
        <button class="lightbox-nav lightbox-prev" aria-label="Previous photo">&#10094;</button>
        <img class="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" aria-label="Next photo">&#10095;</button>
        <div class="lightbox-counter"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
